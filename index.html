<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>PvSPŠE</title>
    <link rel="stylesheet" href="visual.css">
</head>
<body>

<div id="start-screen">
    <img src="startScreenImg.png" alt="startScreenImg" id="pvspšeimg">
    <button id="start-btn">Start Game</button>
    <img src="crazydave.png" alt="crazydave" id="crazydave">
</div>

<div id="grid"></div>

<div id="shop">
    <div class="shop-item-wrapper">
        <img src="sunflower.png" class="shop-item" alt="sunflower">
        <span class="sun-cost">50 <img src="sun.png" alt="sun" width="30" height="30"></span>
    </div>
    <div class="shop-item-wrapper">
        <img src="wallnut.png" class="shop-item" alt="wallnut">
        <span class="sun-cost">50 <img src="sun.png" alt="sun" width="30" height="30"></span>
    </div>
    <div class="shop-item-wrapper">
        <img src="peashooter.png" class="shop-item" alt="peashooter">
        <span class="sun-cost">100 <img src="sun.png" alt="sun" width="30" height="30"></span>
    </div>
    <div class="shop-item-wrapper">
        <img src="potatomine.png" class="shop-item" alt="potatomine">
        <span class="sun-cost">25 <img src="sun.png" alt="sun" width="30" height="30"></span>
    </div>
    <img id="shovel" src="shovel.png" alt="shovel">
</div>

<div id="sunCounter"><img src="sun.png" alt="sun" width="30" height="30"> 150</div>

<script src="logic.js"></script>
<script src="zombieLogic.js"></script>
<script src="plantLogic.js"></script>
</body>
</html>
